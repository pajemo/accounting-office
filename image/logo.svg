<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d41439;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b10a21;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Main logo background -->
  <rect width="120" height="120" rx="24" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- Inner border -->
  <rect x="8" y="8" width="104" height="104" rx="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- MKM Letters -->
  <text x="60" y="75" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="36" letter-spacing="2">MKM</text>
  
  <!-- Accounting subtitle -->
  <text x="60" y="95" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" font-weight="normal" font-size="12" letter-spacing="1">ACCOUNTING</text>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="90" cy="30" r="2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="90" cy="90" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="30" cy="90" r="2" fill="rgba(255,255,255,0.2)"/>
</svg>