<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Dostęp zabroniony | MKM Biuro Rachunkowe</title>
    <link rel="icon" type="image/png" href="image/favicon.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #b10a21 0%, #8f0a1c 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0;
        }
        .error-description {
            font-size: 1rem;
            margin: 1rem 0 2rem 0;
            opacity: 0.9;
        }
        .home-button {
            background: white;
            color: #b10a21;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        .home-button:hover {
            transform: scale(1.05);
        }
        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="image/mkm-logo.png" alt="MKM Logo" class="logo" onerror="this.style.display='none'">
        <h1 class="error-code">403</h1>
        <h2 class="error-message">Dostęp zabroniony</h2>
        <p class="error-description">
            Nie masz uprawnień do przeglądania tej strony. Może to być area tylko dla administratorów.
        </p>
        <a href="/" class="home-button">Powrót do strony głównej</a>
    </div>
</body>
</html>
